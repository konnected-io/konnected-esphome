binary_sensor:

  - id: zone9
    name: Zone 9    
    pin:
      number: $zone9
      mode: INPUT
    platform: gpio   
    device_class: $zone9_device_class
    filters:
      - delayed_on_off: $sensor_debounce_time
    on_state:
      - if:
          condition:
            lambda: return id(blink_on_state);
          then:
            - script.execute: blink_status_led
