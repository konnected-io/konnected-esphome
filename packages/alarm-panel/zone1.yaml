binary_sensor:

  - id: zone1
    name: Zone 1
    pin:
      number: $zone1
      mode: INPUT_PULLUP
    platform: gpio   
    device_class: $zone1_device_class
    filters:
      - delayed_on_off: $sensor_debounce_time
    on_state:
      - if:
          condition:
            lambda: return id(blink_on_state);
          then:
            - script.execute: blink_status_led
