binary_sensor:

  - id: zone14
    name: Zone 14
    pin:
      number: $zone14
      mode: INPUT_PULLUP
    platform: gpio
    filters:
      - delayed_on_off: $sensor_debounce_time
    on_state:
      - if:
          condition:
            lambda: return id(blink_on_state);
          then:
            - script.execute: blink_status_led
