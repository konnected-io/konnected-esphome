globals:
  - id: blink_on_state
    type: bool
    initial_value: $blink_on_state

light:
  - platform: esp32_rmt_led_strip
    id: blue_status_led
    name: Status LED
    internal: true
    rgb_order: GRB
    pin: $status_led
    num_leds: 1
    chipset: WS2812
    default_transition_length: 0s

script:
  - id: blink_status_led
    mode: queued
    then:
      - light.turn_on:
          id: blue_status_led
          red: 0
          green: 0
          blue: 100%
          brightness: 50%
      - delay: 100ms
      - light.turn_off: blue_status_led
