globals:
  - id: blink_on_state
    type: bool
    initial_value: $blink_on_state
  # dedupes the high-rate set_state() calls status_led makes while blinking
  - id: status_led_on
    type: bool
    restore_value: no
    initial_value: 'false'

light:
  - platform: esp32_rmt_led_strip
    id: rgbw_status_led
    # internal: true
    name: Status LED
    rgb_order: GRB
    pin: $status_led
    num_leds: 1
    chipset: WS2812
    default_transition_length: 0s

  # binary system-status indicator, rendered onto the RGBW strip as dim blue
  - platform: status_led
    id: blue_status_led
    output: rgbw_status_led_output

output:
  - platform: template
    id: rgbw_status_led_output
    type: binary
    write_action:
      - if:
          condition:
            lambda: 'return state != id(status_led_on);'
          then:
            - lambda: 'id(status_led_on) = state;'
            - if:
                condition:
                  lambda: 'return state;'
                then:
                  - light.turn_on:
                      id: rgbw_status_led
                      red: 0%
                      green: 0%
                      blue: 100%
                      brightness: 50%
                else:
                  - light.turn_off: rgbw_status_led

script:
  - id: blink_status_led
    mode: queued
    then:
      - light.turn_on: blue_status_led
      - delay: 100ms
      - light.turn_off: blue_status_led
